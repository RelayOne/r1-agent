version: 2

project_name: stoke

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1 -timeout=120s

builds:
  - id: stoke
    main: ./cmd/stoke
    binary: stoke
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CC=o64-clang
  - id: stoke-acp
    # Agent Client Protocol adapter (S-U-002). Pure-Go JSON-RPC
    # stdio transport; no CGO dependency unlike the main stoke
    # binary, so cross-compiles without the gcc overrides.
    main: ./cmd/stoke-acp
    binary: stoke-acp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ericmacdougall
    name: Stoke
  draft: false
  prerelease: auto

brews:
  # S2-4 (work-r1-rename): dual-publish under both the legacy `stoke`
  # formula and the canonical `r1` formula during the 90d transition
  # window. Both formulae install identical binaries; the legacy
  # `stoke` formula's caveats message points users at `r1` as the
  # canonical name going forward.
  - name: stoke
    repository:
      owner: ericmacdougall
      name: homebrew-stoke
      branch: main
    directory: Formula
    homepage: https://github.com/ericmacdougall/Stoke
    description: "Stoke — agentic coding orchestrator (R1)"
    license: "Apache-2.0"
    install: |
      bin.install "stoke"
      bin.install "stoke-acp" if File.exist?("stoke-acp")
    caveats: |
      Stoke is being renamed to R1. Install the canonical formula with:
        brew install ericmacdougall/stoke/r1
      The `stoke` formula will remain available as an alias through
      2026-07-22 (90d from the rename commit).
    test: |
      system "#{bin}/stoke", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): stoke {{ .Tag }}"
  - name: r1
    repository:
      owner: ericmacdougall
      name: homebrew-stoke
      branch: main
    directory: Formula
    homepage: https://github.com/ericmacdougall/Stoke
    description: "R1 — agentic coding orchestrator (formerly Stoke)"
    license: "Apache-2.0"
    install: |
      bin.install "stoke" => "r1"
      bin.install "stoke-acp" => "r1-acp" if File.exist?("stoke-acp")
    test: |
      system "#{bin}/r1", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): r1 {{ .Tag }}"
