version: 2

project_name: stoke

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1 -timeout=120s

builds:
  - id: stoke
    main: ./cmd/stoke
    binary: stoke
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CC=o64-clang
  - id: stoke-acp
    # Agent Client Protocol adapter (S-U-002). Pure-Go JSON-RPC
    # stdio transport; no CGO dependency unlike the main stoke
    # binary, so cross-compiles without the gcc overrides.
    main: ./cmd/stoke-acp
    binary: stoke-acp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: r1
    # r1 shim binary (work-r1-rename.md S2-3). Thin exec-shim that
    # delegates to the sibling `stoke` binary; no CGO, so it cross-
    # compiles without the gcc overrides the main stoke build uses.
    # Shipped alongside `stoke` during the 60-90d transition window
    # so both names work; once S5-* tap-rename lands, `r1` becomes
    # canonical and `stoke` retires.
    main: ./cmd/r1
    binary: r1
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ericmacdougall
    name: Stoke
  draft: false
  prerelease: auto

brews:
  # S6-4 (2026-07-23): the legacy `stoke` Homebrew formula has been
  # dropped. `r1` is the only canonical formula published going
  # forward. Operators must retract the `stoke` formula in the
  # homebrew-stoke tap repository on the same day via an explicit
  # `deprecate!` directive -- that edit is NOT part of this branch
  # because it lives in a separate tap repository (see
  # docs/s6-deprecation-closures.md §S6-4 for the tap-edit steps).
  - name: r1
    repository:
      owner: ericmacdougall
      name: homebrew-stoke
      branch: main
    directory: Formula
    homepage: https://github.com/ericmacdougall/Stoke
    description: "R1 — agentic coding orchestrator"
    license: "Apache-2.0"
    install: |
      bin.install "r1"
      bin.install "stoke-acp" => "r1-acp" if File.exist?("stoke-acp")
    test: |
      system "#{bin}/r1", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): r1 {{ .Tag }}"
