version: 2

project_name: stoke

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1 -timeout=120s

builds:
  - id: stoke
    main: ./cmd/stoke
    binary: stoke
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CC=o64-clang
  - id: stoke-acp
    # Agent Client Protocol adapter (S-U-002). Pure-Go JSON-RPC
    # stdio transport; no CGO dependency unlike the main stoke
    # binary, so cross-compiles without the gcc overrides.
    main: ./cmd/stoke-acp
    binary: stoke-acp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: r1
    # r1 shim binary (work-r1-rename.md S2-3). Thin exec-shim that
    # delegates to the sibling `stoke` binary; no CGO, so it cross-
    # compiles without the gcc overrides the main stoke build uses.
    # Shipped alongside `stoke` during the 60-90d transition window
    # so both names work; once S5-* tap-rename lands, `r1` becomes
    # canonical and `stoke` retires.
    main: ./cmd/r1
    binary: r1
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # work-r1-rename.md §S2-2: the GitHub repo transfers from
  # `ericmacdougall/Stoke` to `RelayOne/r1`. Until the admin-side transfer
  # lands, `goreleaser release` continues to resolve the legacy owner/name
  # via GitHub's automatic redirect. After the transfer, flip `owner:` to
  # `RelayOne` and `name:` to `r1`. Leaving the legacy values in place
  # today keeps current tag releases working; this block will be flipped
  # atomically with the admin-merge of the S2-2 rename.
  github:
    owner: ericmacdougall
    name: Stoke
  draft: false
  prerelease: auto

brews:
  # S2-4 (work-r1-rename): dual-publish under both the legacy `stoke`
  # formula and the canonical `r1` formula during the 90d transition
  # window. Both formulae install identical binaries; the legacy
  # `stoke` formula's caveats message points users at `r1` as the
  # canonical name going forward.
  - name: stoke
    repository:
      owner: ericmacdougall
      name: homebrew-stoke
      branch: main
    directory: Formula
    # work-r1-rename.md §S2-2: homepage flips to the canonical RelayOne/r1
    # URL. GitHub preserves a redirect from ericmacdougall/Stoke during the
    # transition window so legacy consumers don't 404.
    homepage: https://github.com/RelayOne/r1
    description: "Stoke — agentic coding orchestrator (R1)"
    license: "Apache-2.0"
    install: |
      bin.install "stoke"
      bin.install "stoke-acp" if File.exist?("stoke-acp")
      # work-r1-rename.md S2-3: ship `r1` alongside `stoke` during
      # the 60-90d rename transition. `r1` is a thin exec-shim that
      # delegates to the sibling `stoke` binary in the same bindir.
      bin.install "r1" if File.exist?("r1")
    caveats: |
      Stoke is being renamed to R1. Install the canonical formula with:
        brew install RelayOne/r1-agent/r1
      Legacy alias still works during the transition window:
        brew install ericmacdougall/stoke/r1
      The `stoke` formula will remain available as an alias through
      2026-07-22 (90d from the rename commit).
    test: |
      system "#{bin}/stoke", "--version"
      system "#{bin}/r1", "--version" if File.exist?("#{bin}/r1")
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): stoke {{ .Tag }}"
  - name: r1
    repository:
      owner: ericmacdougall
      name: homebrew-stoke
      branch: main
    directory: Formula
    # work-r1-rename.md §S2-2: homepage flips to the canonical RelayOne/r1
    # URL (GitHub redirect preserves the legacy link).
    homepage: https://github.com/RelayOne/r1
    description: "R1 — agentic coding orchestrator (formerly Stoke)"
    license: "Apache-2.0"
    install: |
      bin.install "stoke" => "r1"
      bin.install "stoke-acp" => "r1-acp" if File.exist?("stoke-acp")
    test: |
      system "#{bin}/r1", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): r1 {{ .Tag }}"
