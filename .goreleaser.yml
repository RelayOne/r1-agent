version: 2

project_name: r1

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1 -timeout=120s

builds:
  - id: r1
    main: ./cmd/r1
    binary: r1
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CC=o64-clang
  - id: stoke-acp
    # Agent Client Protocol adapter (S-U-002). Pure-Go JSON-RPC
    # stdio transport; no CGO dependency unlike the main r1
    # binary, so cross-compiles without the gcc overrides.
    main: ./cmd/stoke-acp
    binary: stoke-acp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # D-014: RelayOne/r1-agent is the canonical repo (new repo, not rename).
  # Goreleaser publishes releases to RelayOne/r1-agent. The GITHUB_TOKEN
  # on CI is scoped to the repo the workflow runs in, so this must match
  # the repo where the workflow + tag live.
  github:
    owner: RelayOne
    name: r1-agent
  draft: false
  prerelease: auto

brews:
  - name: r1
    repository:
      owner: ericmacdougall
      name: homebrew-stoke
      branch: main
    directory: Formula
    homepage: https://github.com/RelayOne/r1-agent
    description: "R1 — agentic coding orchestrator"
    license: "Apache-2.0"
    install: |
      bin.install "r1"
      bin.install "stoke-acp" if File.exist?("stoke-acp")
    test: |
      system "#{bin}/r1", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): r1 {{ .Tag }}"
