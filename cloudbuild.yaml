# cloudbuild.yaml — r1 (stoke) CI
# Replaces GitHub Actions ci.yml
# Run locally: gcloud builds submit --config=cloudbuild.yaml .
# Run remotely: triggered on every push to main via Cloud Build trigger

steps:
  - name: 'golang:1.25'
    id: mod-tidy-check
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go mod tidy
        git diff --exit-code go.mod go.sum

  - name: 'golang:1.25'
    id: build
    waitFor: ['mod-tidy-check']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go build ./cmd/stoke ./cmd/r1 ./cmd/stoke-acp
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: vet
    waitFor: ['mod-tidy-check']
    entrypoint: go
    args: ['vet', './...']

  - name: 'golang:1.25'
    id: test
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test ./... -count=1 -timeout=120s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: race
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test ./... -race -count=1 -timeout=300s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: build-multi-platform-stoke
    waitFor: ['build', 'test', 'race']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        mkdir -p dist
        for OS_ARCH in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
          OS=${OS_ARCH%/*}
          ARCH=${OS_ARCH#*/}
          EXT=""
          if [ "$OS" = "windows" ]; then
            EXT=".exe"
          fi
          CGO_ENABLED=0 GOOS=$OS GOARCH=$ARCH go build \
            -trimpath \
            -ldflags "-s -w" \
            -o dist/stoke-${OS}-${ARCH}${EXT} \
            ./cmd/stoke
        done

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish-stoke-binaries
    waitFor: ['build-multi-platform-stoke']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        for f in dist/*; do
          gcloud storage cp "$f" "${_PUBLIC_BUCKET}/${SHORT_SHA}/$(basename "$f")"
          gcloud storage cp "$f" "${_PUBLIC_BUCKET}/latest/$(basename "$f")"
        done

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  labels:
    permanent: 'true'
    repo: r1
    lang: go

substitutions:
  _PUBLIC_BUCKET: gs://relayone-488319-public/r1
