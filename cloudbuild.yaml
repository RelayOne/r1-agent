# cloudbuild.yaml — r1 CI
# Replaces GitHub Actions ci.yml
# Run locally: gcloud builds submit --config=cloudbuild.yaml .
# Run remotely: triggered on every push to main via Cloud Build trigger

steps:
  # web/ build + test runs first so the dist/ output is in place
  # before the Go build embeds it (per spec web-chat-ui item 50).
  # Failure here fails CI before any Go gate runs.
  - name: 'node:20'
    id: web-build
    entrypoint: bash
    args:
      - -c
      - |
        cd web
        npm ci --no-audit --no-fund
        npm run build
        npm run test
    waitFor: ['-']

  - name: 'golang:1.25'
    id: mod-tidy-check
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go mod tidy
        git diff --exit-code go.mod go.sum

  - name: 'golang:1.25'
    id: build
    waitFor: ['mod-tidy-check', 'web-build']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go build ./cmd/r1 ./cmd/r1-acp
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: vet
    waitFor: ['mod-tidy-check']
    entrypoint: go
    args: ['vet', './...']

  - name: 'golang:1.25'
    id: lint-lane-events
    waitFor: ['mod-tidy-check']
    entrypoint: bash
    args: ['scripts/lint-lane-events.sh']

  # r1d-server Phase A audit gate (specs/r1d-server.md §10).
  # Flags every unannotated os.Chdir / os.Getwd / filepath.Abs("") /
  # os.Open("./...") call in ./internal/... and ./cmd/... — this is the
  # BLOCKING precondition before the multi-session daemon (Phase E) is
  # enabled. A single stray cwd-mutating call inside a goroutine handler
  # silently leaks workdir between concurrent sessions (risk R1, see
  # spec §11.5). Fails the build red on any unannotated hit.
  - name: 'golang:1.25'
    id: lint-chdir
    waitFor: ['mod-tidy-check']
    entrypoint: bash
    args: ['tools/lint-no-chdir.sh']

  - name: 'golang:1.25'
    id: test
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test ./... -count=1 -timeout=120s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: race
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test ./... -race -count=1 -timeout=300s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: build-multi-platform-r1
    waitFor: ['build', 'test', 'race']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        mkdir -p dist
        for OS_ARCH in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
          OS=$${OS_ARCH%/*}
          ARCH=$${OS_ARCH#*/}
          EXT=""
          if [ "$$OS" = "windows" ]; then
            EXT=".exe"
          fi
          CGO_ENABLED=0 GOOS=$$OS GOARCH=$$ARCH go build \
            -trimpath \
            -ldflags "-s -w" \
            -o dist/r1-$${OS}-$${ARCH}$${EXT} \
            ./cmd/r1
        done

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish-r1-binaries
    waitFor: ['build-multi-platform-r1']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        for f in dist/*; do
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/${SHORT_SHA}/$$(basename "$$f")"
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/latest/$$(basename "$$f")"
        done

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _PUBLIC_BUCKET: gs://relayone-488319-public/r1
