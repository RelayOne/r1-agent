# cloudbuild.yaml — r1 CI
# Replaces GitHub Actions ci.yml
# Run locally: gcloud builds submit --config=cloudbuild.yaml .
# Run remotely: triggered on every push to main via Cloud Build trigger

steps:
  - name: 'golang:1.25'
    id: vendor-check
    entrypoint: bash
    args:
      - -c
      - |
        # Vendored mode — no network fetches, deps live in vendor/.
        # Private RelayOne modules (heroa, coderadar) cannot be fetched on CI
        # without GH auth; vendoring is the workaround. See
        # plans/grand-plan/F-N+45-1-r1-agent-CI-needs-private-repo-auth.md.
        ls vendor/modules.txt > /dev/null

  - name: 'golang:1.25'
    id: build
    waitFor: ['vendor-check']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go build -mod=vendor ./cmd/r1 ./cmd/r1-acp
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: vet
    waitFor: ['vendor-check']
    entrypoint: go
    args: ['vet', '-mod=vendor', './...']

  - name: 'golang:1.25'
    id: test
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test -mod=vendor ./... -count=1 -timeout=120s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: race
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test -mod=vendor ./... -race -count=1 -timeout=300s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: build-multi-platform-r1
    waitFor: ['build', 'test', 'race']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        mkdir -p dist
        for OS_ARCH in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
          OS=$${OS_ARCH%/*}
          ARCH=$${OS_ARCH#*/}
          EXT=""
          if [ "$$OS" = "windows" ]; then
            EXT=".exe"
          fi
          CGO_ENABLED=0 GOOS=$$OS GOARCH=$$ARCH go build \
            -mod=vendor \
            -trimpath \
            -ldflags "-s -w -X main.version=$SHORT_SHA" \
            -o dist/r1-$${OS}-$${ARCH}$${EXT} \
            ./cmd/r1
        done

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish-r1-binaries
    waitFor: ['build-multi-platform-r1']
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        for f in dist/*; do
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/${SHORT_SHA}/$$(basename "$$f")"
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/latest/$$(basename "$$f")"
        done

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _PUBLIC_BUCKET: gs://relayone-488319-public/r1
