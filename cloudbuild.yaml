# cloudbuild.yaml — r1 (stoke) CI
# Replaces GitHub Actions ci.yml
# Run locally: gcloud builds submit --config=cloudbuild.yaml .
# Run remotely: triggered on every push to main via Cloud Build trigger

steps:
  - name: 'golang:1.25'
    id: mod-tidy-check
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go mod tidy
        git diff --exit-code go.mod go.sum

  - name: 'golang:1.25'
    id: build
    waitFor: ['mod-tidy-check']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go build ./cmd/stoke ./cmd/r1 ./cmd/stoke-acp
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: vet
    waitFor: ['mod-tidy-check']
    entrypoint: go
    args: ['vet', './...']

  - name: 'golang:1.25'
    id: test
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test ./... -count=1 -timeout=120s
    env:
      - 'CGO_ENABLED=1'

  - name: 'golang:1.25'
    id: race
    waitFor: ['vet']
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q gcc
        go test ./... -race -count=1 -timeout=300s
    env:
      - 'CGO_ENABLED=1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  labels:
    permanent: 'true'
    repo: r1
    lang: go
