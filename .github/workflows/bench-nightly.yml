name: Bench Nightly

on:
  schedule:
    - cron: "0 6 * * *"  # 6:00 UTC daily
  workflow_dispatch:       # manual trigger

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: go build ./cmd/stoke

      - name: Run golden mission tests
        run: go test ./internal/bench/ -run TestGolden -v -timeout=300s

      - name: Run bench corpus (fixture mode)
        run: |
          go run ./bench/cmd/bench run \
            --corpus corpus/ \
            --harnesses stoke \
            --reps 1 \
            --max-parallel 2 \
            --output results.json || true

      - name: Generate report
        if: always()
        run: |
          mkdir -p reports
          go run ./bench/cmd/bench report \
            --input results.json \
            --format html \
            --output reports/bench-nightly.html || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
