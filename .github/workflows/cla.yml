name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN is optional; if set, CLA signatures
          # are stored in a dedicated repo (remote-organization-name /
          # remote-repository-name below) instead of an action-scoped
          # gist. Recommended for OSS projects with many contributors.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_GIST_TOKEN }}
        with:
          path-to-signatures: "signatures/v1/cla.json"
          path-to-document: "https://github.com/ericmacdougall/Stoke/blob/main/CLA.md"
          branch: "main"
          # Bots and release automation don't need to sign.
          allowlist: "dependabot[bot],goreleaserbot,github-actions[bot]"
          # Optional remote-store config — create ericmacdougall/cla-signatures
          # as a private repo, then set CLA_GIST_TOKEN. Without these, the
          # action falls back to an internal gist which still works but is
          # less visible to maintainers.
          remote-organization-name: ericmacdougall
          remote-repository-name: cla-signatures
          # Message posted to PR when CLA is not signed
          custom-notsigned-prcomment: "Thanks for your pull request! Before we can merge, please sign our CLA by commenting on this PR with: `I have read the CLA Document and I hereby sign the CLA`. See [CLA.md](https://github.com/ericmacdougall/Stoke/blob/main/CLA.md) for the full text."
