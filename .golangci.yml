run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # errcheck removed 2026-04-23: this codebase already excludes
    # gosec G104 (unhandled errors) as a deliberate policy call — see
    # linters-settings.gosec.excludes below. errcheck enforces the
    # exact same class of finding, so enabling it alongside a gosec
    # exclusion produces 600+ findings that are deliberately ignored
    # everywhere else. Re-enable when the codebase does a one-shot
    # errcheck sweep.
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gosec
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    # exportloopref: fully inactivated since Go 1.22 (loop vars are
    # now per-iteration by default), so the linter self-disables with
    # a WARN that gets surfaced as an error in CI. Removed.
    - forcetypeassert
    - goconst
    - makezero
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    # unparam: mvdan.cc/unparam@v0.0.0-20240528 bundled with
    # golangci-lint v1.64.8 panics on Go 1.25 type-system changes
    # (nil-pointer deref in internal/hire). Re-enable when the linter
    # bundles a newer unparam, or when this repo migrates to
    # golangci-lint v2.x.
    - wastedassign

linters-settings:
  gocritic:
    enabled-checks:
      - appendAssign
      - argOrder
      - badCall
      - badCond
      - badRegexp
      - caseOrder
      - dupArg
      - dupBranchBody
      - dupCase
      - dupSubExpr
      - flagDeref
      - nilValReturn
      - offBy1
      - sloppyReassign
      - weakCond

  govet:
    enable-all: true
    disable:
      - fieldalignment

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf

  gosec:
    excludes:
      - G104  # unhandled errors (too noisy for this codebase)
      - G304  # file inclusion via variable (expected in a file-processing tool)

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - docs
    - bench
    - corpus
  # errcheck exclude-rules removed — errcheck itself is disabled
  # (see linters.enable above). Keeping exclude-dirs in force.
