<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stoke Rules</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); }
.wrap { max-width: 1180px; margin: 0 auto; padding: 24px; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.topbar a { color: var(--accent); text-decoration: none; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
h1, h2 { margin: 0 0 12px; }
h1 { font-size: 24px; }
h2 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
form { display: grid; gap: 12px; }
textarea, input, select, button { font: inherit; }
textarea, input, select {
  width: 100%;
  background: #0b0f14;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 10px 12px;
}
textarea { min-height: 90px; resize: vertical; }
button {
  background: var(--accent);
  color: #08111b;
  border: none;
  border-radius: 6px;
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 700;
}
button.secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.row { display: grid; grid-template-columns: 1.6fr 0.8fr 1fr 0.9fr; gap: 12px; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { color: var(--text-dim); font-size: 12px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.active { background: rgba(63,185,80,0.15); color: var(--green); }
.paused { background: rgba(210,153,34,0.15); color: var(--yellow); }
.strategy { color: var(--accent); }
.metrics { color: var(--text-dim); font-size: 12px; }
.actions { display: flex; gap: 8px; }
.empty { color: var(--text-dim); font-style: italic; text-align: center; padding: 18px; }
.error { color: var(--red); min-height: 18px; }
@media (max-width: 900px) {
  .row { grid-template-columns: 1fr; }
  table, thead, tbody, tr, td, th { display: block; }
  thead { display: none; }
  td { border-bottom: 0; padding: 8px 0; }
  tr { border-bottom: 1px solid var(--border); padding: 10px 0; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>User-Defined Rules</h1>
    <a href="/dashboard">Back to dashboard</a>
  </div>

  <div class="card">
    <h2>Add Rule</h2>
    <form id="rule-form">
      <textarea id="rule-text" placeholder='Example: never call tool delete_branch with name matching ^(staging|dev|prod)$'></textarea>
      <div class="row">
        <select id="rule-scope">
          <option value="repo">repo</option>
          <option value="global">global</option>
          <option value="task">task</option>
        </select>
        <input id="rule-filter" placeholder="tool filter regex (optional)">
        <select id="rule-strategy">
          <option value="">auto strategy</option>
          <option value="regex_filter">regex_filter</option>
          <option value="argument_validator">argument_validator</option>
          <option value="subagent_check">subagent_check</option>
        </select>
        <button type="submit">Add Rule</button>
      </div>
      <div id="form-error" class="error"></div>
    </form>
  </div>

  <div class="card">
    <h2>Rules</h2>
    <table>
      <thead>
        <tr>
          <th>Rule</th>
          <th>Status</th>
          <th>Strategy</th>
          <th>Metrics</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="rules-body">
        <tr><td colspan="5" class="empty">No rules defined</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function escapeHTML(value) {
  return String(value || '').replace(/[&<>"']/g, function(ch) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]);
  });
}

function fetchRules() {
  return fetch('/rules?format=json', { headers: { 'Accept': 'application/json' } })
    .then(function(resp) {
      if (!resp.ok) throw new Error('Failed to load rules');
      return resp.json();
    })
    .then(function(data) {
      renderRules(data.rules || []);
    })
    .catch(function(err) {
      document.getElementById('rules-body').innerHTML = '<tr><td colspan="5" class="empty">' + escapeHTML(err.message) + '</td></tr>';
    });
}

function renderRules(rules) {
  var body = document.getElementById('rules-body');
  if (!rules.length) {
    body.innerHTML = '<tr><td colspan="5" class="empty">No rules defined</td></tr>';
    return;
  }
  body.innerHTML = rules.map(function(rule) {
    var metrics = rule.impact_metrics || {};
    var actions = rule.status === 'paused'
      ? '<button class="secondary" onclick="resumeRule(\'' + rule.id + '\')">Resume</button>'
      : '<button class="secondary" onclick="pauseRule(\'' + rule.id + '\')">Pause</button>';
    actions += '<button class="secondary" onclick="deleteRule(\'' + rule.id + '\')">Delete</button>';
    return '<tr>' +
      '<td><div>' + escapeHTML(rule.text) + '</div><div class="metrics">' + escapeHTML(rule.id) + ' · scope=' + escapeHTML(rule.scope) + ' · filter=' + escapeHTML(rule.tool_filter) + '</div></td>' +
      '<td><span class="badge ' + escapeHTML(rule.status) + '">' + escapeHTML(rule.status) + '</span></td>' +
      '<td><span class="strategy">' + escapeHTML(rule.enforcement_strategy) + '</span></td>' +
      '<td class="metrics">invocations=' + (metrics.invocations || 0) +
        ' · allowed=' + (metrics.allowed || 0) +
        ' · blocked=' + (metrics.blocked || 0) +
        ' · warnings=' + (metrics.warnings || 0) +
        ' · avg_check_ms=' + Number(metrics.avg_check_ms || 0).toFixed(2) +
        ' · avg_tokens=' + Number(metrics.avg_tokens_used || 0).toFixed(2) + '</td>' +
      '<td><div class="actions">' + actions + '</div></td>' +
      '</tr>';
  }).join('');
}

function submitRule(event) {
  event.preventDefault();
  document.getElementById('form-error').textContent = '';
  fetch('/rules', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      text: document.getElementById('rule-text').value,
      scope: document.getElementById('rule-scope').value,
      tool_filter: document.getElementById('rule-filter').value,
      enforcement_strategy: document.getElementById('rule-strategy').value
    })
  }).then(function(resp) {
    if (!resp.ok) {
      return resp.json().then(function(body) {
        throw new Error(body.error || 'Failed to add rule');
      }).catch(function() {
        throw new Error('Failed to add rule');
      });
    }
    document.getElementById('rule-form').reset();
    return fetchRules();
  }).catch(function(err) {
    document.getElementById('form-error').textContent = err.message;
  });
}

function pauseRule(id) {
  fetch('/rules/' + encodeURIComponent(id) + '/pause', { method: 'POST', headers: { 'Accept': 'application/json' } }).then(fetchRules);
}

function resumeRule(id) {
  fetch('/rules/' + encodeURIComponent(id) + '/resume', { method: 'POST', headers: { 'Accept': 'application/json' } }).then(fetchRules);
}

function deleteRule(id) {
  fetch('/rules/' + encodeURIComponent(id), { method: 'DELETE', headers: { 'Accept': 'application/json' } }).then(fetchRules);
}

document.getElementById('rule-form').addEventListener('submit', submitRule);
fetchRules();
</script>
</body>
</html>
