substitutions:
  _PUBLIC_BUCKET: gs://relayone-488319-public/r1

steps:
  - name: 'golang:1.25'
    id: build-multi-platform-stoke
    entrypoint: bash
    args:
      - -ceu
      - |
        ROOT="."
        if [ ! -f go.mod ] && [ -f r1-agent/go.mod ]; then
          ROOT="r1-agent"
        fi
        cd "$$ROOT"

        # `r1-agent` currently depends on sibling checkouts for both the
        # Heroa SDK and the private CodeRadar Go SDK. Manual Cloud Build
        # submit from /home/eric/repos uploads those siblings into
        # /workspace, so rewrite the existing absolute replace targets
        # onto relative workspace paths before cross-compiling.
        if [ -d ../CodeRadar/sdks/go/coderadar ]; then
          go mod edit -replace github.com/RelayOne/coderadar/sdks/go/coderadar=../CodeRadar/sdks/go/coderadar
        else
          go mod edit -dropreplace github.com/RelayOne/coderadar/sdks/go/coderadar
          go mod download github.com/RelayOne/coderadar/sdks/go/coderadar
        fi
        if [ -d ../heroa/sdk/go ]; then
          go mod edit -replace heroa.dev/sdk-go=../heroa/sdk/go
        else
          go mod edit -dropreplace heroa.dev/sdk-go
        fi
        mkdir -p dist
        for OS in linux darwin windows; do
          for ARCH in amd64 arm64; do
            if [ "$$OS" = "windows" ] && [ "$$ARCH" = "arm64" ]; then
              continue
            fi
            EXT=""
            if [ "$$OS" = "windows" ]; then
              EXT=".exe"
            fi
            CGO_ENABLED=0 GOOS="$$OS" GOARCH="$$ARCH" go build \
              -trimpath \
              -ldflags "-s -w" \
              -o "dist/stoke-$$OS-$$ARCH$$EXT" \
              ./cmd/stoke
          done
        done

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish-stoke-binaries
    waitFor: ['build-multi-platform-stoke']
    entrypoint: bash
    args:
      - -ceu
      - |
        ROOT="."
        if [ ! -d dist ] && [ -d r1-agent/dist ]; then
          ROOT="r1-agent"
        fi
        cd "$$ROOT"
        REF="${SHORT_SHA:-${BUILD_ID}}"
        for f in dist/*; do
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/$$REF/$$(basename "$$f")"
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/latest/$$(basename "$$f")"
        done

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
