substitutions:
  _PUBLIC_BUCKET: gs://relayone-488319-public/r1

steps:
  - name: 'golang:1.25'
    id: build-multi-platform-r1
    entrypoint: bash
    args:
      - -ceu
      - |
        ROOT="."
        if [ ! -f go.mod ] && [ -f r1-agent/go.mod ]; then
          ROOT="r1-agent"
        fi
        cd "$$ROOT"

        # `cmd/r1` does not import the private Heroa or CodeRadar SDKs,
        # but the module file can still force Cloud Build to resolve them.
        # Strip those requirements when the sibling checkout is absent so
        # trigger builds from the standalone GitHub repo remain reproducible.
        if [ -d ../CodeRadar/sdks/go/coderadar ]; then
          go mod edit -replace github.com/RelayOne/coderadar/sdks/go/coderadar=../CodeRadar/sdks/go/coderadar
        else
          go mod edit -replace github.com/RelayOne/coderadar/sdks/go/coderadar=./third_party/coderadar-go-sdk
        fi
        if [ -d ../heroa/sdk/go ]; then
          go mod edit -replace heroa.dev/sdk-go=../heroa/sdk/go
        else
          go mod edit -dropreplace heroa.dev/sdk-go
          go mod edit -droprequire heroa.dev/sdk-go
        fi
        mkdir -p dist
        for OS in linux darwin windows; do
          for ARCH in amd64 arm64; do
            if [ "$$OS" = "windows" ] && [ "$$ARCH" = "arm64" ]; then
              continue
            fi
            EXT=""
            if [ "$$OS" = "windows" ]; then
              EXT=".exe"
            fi
            CGO_ENABLED=0 GOOS="$$OS" GOARCH="$$ARCH" go build \
              -trimpath \
              -ldflags "-s -w" \
              -o "dist/r1-$$OS-$$ARCH$$EXT" \
              ./cmd/r1
          done
        done

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: publish-r1-binaries
    waitFor: ['build-multi-platform-r1']
    entrypoint: bash
    args:
      - -ceu
      - |
        ROOT="."
        if [ ! -d dist ] && [ -d r1-agent/dist ]; then
          ROOT="r1-agent"
        fi
        cd "$$ROOT"
        REF="${SHORT_SHA:-${BUILD_ID}}"
        for f in dist/*; do
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/$$REF/$$(basename "$$f")"
          gcloud storage cp "$$f" "${_PUBLIC_BUCKET}/latest/$$(basename "$$f")"
        done

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
