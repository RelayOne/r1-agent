# services/cloudbuild-deploy.yaml — auto-deploy r1 SaaS surfaces.
#
# Triggered on push to main; rebuilds + redeploys r1-coord-api,
# r1-docs, r1-downloads-cdn to the prod env. Staging + dev get
# pushed via separate triggers off the staging / dev branches per
# the standing rules.
#
# Tag = short SHA. Image path = us-central1-docker.pkg.dev/relayone-488319/r1/<svc>:<sha>.
#
# Per the standing rules:
#   - region us-central1
#   - min-instances 1
#   - billing instance-based (no CPU throttling)
#   - secrets bound via --set-secrets (Secret Manager)

substitutions:
  _ENV: prod  # override per trigger; dev | staging | prod

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # Three image builds in parallel.
  - id: build-coord-api
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    dir: services/r1-coord-api
    args:
      - build
      - --build-arg=VERSION=$SHORT_SHA
      - -t=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-coord-api:$SHORT_SHA
      - -t=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-coord-api:${_ENV}-latest
      - .

  - id: build-docs
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    dir: services/r1-docs
    args:
      - build
      - --build-arg=VERSION=$SHORT_SHA
      - -t=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-docs:$SHORT_SHA
      - -t=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-docs:${_ENV}-latest
      - .

  - id: build-downloads-cdn
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    dir: services/r1-downloads-cdn
    args:
      - build
      - --build-arg=VERSION=$SHORT_SHA
      - -t=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-downloads-cdn:$SHORT_SHA
      - -t=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-downloads-cdn:${_ENV}-latest
      - .

  # Push three images in parallel.
  - id: push-coord-api
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-coord-api']
    args: [push, --all-tags, us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-coord-api]

  - id: push-docs
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-docs']
    args: [push, --all-tags, us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-docs]

  - id: push-downloads-cdn
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-downloads-cdn']
    args: [push, --all-tags, us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-downloads-cdn]

  # Deploy to Cloud Run after all pushes.
  - id: deploy-coord-api
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    waitFor: ['push-coord-api', 'push-docs', 'push-downloads-cdn']
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy r1-coord-api-${_ENV} \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-coord-api:$SHORT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=1 \
          --max-instances=10 \
          --concurrency=80 \
          --cpu=1 \
          --memory=512Mi \
          --port=8080 \
          --no-cpu-throttling \
          --set-env-vars=R1_ENV=${_ENV},R1_VERSION=$SHORT_SHA \
          --set-secrets=DATABASE_URL=r1-${_ENV}-shared-DATABASE_URL:latest

  - id: deploy-docs
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    waitFor: ['push-docs']
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy r1-docs-${_ENV} \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-docs:$SHORT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=1 \
          --max-instances=10 \
          --concurrency=80 \
          --cpu=1 \
          --memory=512Mi \
          --port=8080 \
          --no-cpu-throttling \
          --set-env-vars=R1_ENV=${_ENV},R1_VERSION=$SHORT_SHA

  - id: deploy-downloads-cdn
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    waitFor: ['push-downloads-cdn']
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy r1-downloads-cdn-${_ENV} \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-downloads-cdn:$SHORT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=1 \
          --max-instances=10 \
          --concurrency=80 \
          --cpu=1 \
          --memory=512Mi \
          --port=8080 \
          --no-cpu-throttling \
          --set-env-vars=R1_ENV=${_ENV},R1_VERSION=$SHORT_SHA,R1_BUCKET=relayone-488319-r1-releases

  # Smoke check /livez on all 3 services.
  - id: smoke
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    waitFor: ['deploy-coord-api', 'deploy-docs', 'deploy-downloads-cdn']
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        for SVC in r1-coord-api r1-docs r1-downloads-cdn; do
          URL=$(gcloud run services describe $SVC-${_ENV} --region=us-central1 --format='value(status.url)')
          echo "smoke: $SVC-${_ENV} $URL"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL/livez")
            if [ "$CODE" = "200" ]; then
              echo "  livez=200 (attempt $i)"
              break
            fi
            echo "  livez=$CODE — retrying"
            sleep 2
          done
          if [ "$CODE" != "200" ]; then
            echo "  smoke FAILED"
            exit 1
          fi
        done

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-coord-api:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-docs:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/r1/r1-downloads-cdn:$SHORT_SHA

timeout: 1800s
